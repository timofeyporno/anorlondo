<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anorlodno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #d4d4d4;
            line-height: 1.4;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
        }
        
        /* Минималистичные гранж-текстуры */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.02;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 1px,
                    rgba(255,255,255,0.05) 1px,
                    rgba(255,255,255,0.05) 2px
                );
        }
        
        /* Telegram кнопки в правом верхнем углу */
        .tg-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        
        .tg-button {
            width: 40px;
            height: 40px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #333;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }
        
        .tg-button:hover {
            background: rgba(40, 40, 40, 0.9);
            border-color: #555;
            transform: translateY(-1px);
        }
        
        .tg-button img {
            width: 20px;
            height: 20px;
            filter: grayscale(100%) brightness(0.8);
            transition: all 0.3s ease;
            object-fit: cover;
        }
        
        .tg-button:hover img {
            filter: grayscale(50%) brightness(1.1);
        }
        
        .tooltip {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #333;
            padding: 6px 12px;
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 101;
        }
        
        .tg-button:hover .tooltip {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Заголовок */
        header {
            margin-bottom: 60px;
            position: relative;
        }
        
        .site-title {
            font-size: 48px;
            font-weight: normal;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #fff;
            position: relative;
            display: inline-block;
        }
        
        .site-title::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 1px;
            background: #444;
        }
        
        .site-subtitle {
            font-size: 14px;
            color: #777;
            letter-spacing: 1px;
        }
        
        /* Секции */
        .section {
            margin-bottom: 50px;
        }
        
        .section-title {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }
        
        .section-title::before {
            content: '[';
            margin-right: 8px;
            color: #666;
        }
        
        .section-title::after {
            content: ']';
            margin-left: 8px;
            color: #666;
        }
        
        /* Файлы */
        .files-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        
        .file-item {
            background: rgba(30, 30, 30, 0.5);
            border: 1px solid #333;
            padding: 20px;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .file-item:hover {
            border-color: #666;
            background: rgba(40, 40, 40, 0.7);
        }
        
        .file-name {
            font-size: 18px;
            color: #fff;
            margin-bottom: 8px;
            display: block;
        }
        
        .file-description {
            font-size: 14px;
            color: #888;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .file-size {
            font-size: 12px;
            color: #666;
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .download-link {
            display: inline-block;
            font-size: 14px;
            color: #aaa;
            text-decoration: none;
            border-bottom: 1px solid #444;
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }
        
        .download-link:hover {
            color: #fff;
            border-bottom-color: #fff;
        }
        
        /* Футер */
        footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid #222;
            text-align: center;
        }
        
        .footer-text {
            font-size: 12px;
            color: #555;
            letter-spacing: 1px;
        }
        
        /* Эффекты потёртости */
        .grunge-line {
            height: 1px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(100, 100, 100, 0.3) 50%, 
                transparent 100%);
            margin: 30px 0;
        }
        
        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        
        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #333;
            padding: 12px 20px;
            font-size: 13px;
            color: #aaa;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Мобильная адаптация */
        @media (max-width: 640px) {
            .container {
                padding: 60px 16px 30px;
            }
            
            .tg-buttons {
                top: 10px;
                right: 10px;
                gap: 6px;
            }
            
            .tg-button {
                width: 36px;
                height: 36px;
            }
            
            .tg-button img {
                width: 18px;
                height: 18px;
            }
            
            .site-title {
                font-size: 36px;
            }
            
            .file-size {
                position: static;
                display: block;
                margin-top: 8px;
            }
        }
        
        /* Случайные дефекты */
        .glitch {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0;
            animation: glitchEffect 20s infinite;
        }
        
        @keyframes glitchEffect {
            0%, 100% { opacity: 0; }
            1%, 2% { opacity: 0.03; }
            3%, 4% { opacity: 0; }
            48%, 49% { opacity: 0.02; }
            50%, 51% { opacity: 0; }
            98%, 99% { opacity: 0.01; }
        }
        
        /* Кнопка меню для мобильных (альтернатива) */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #333;
            border-radius: 2px;
            cursor: pointer;
            z-index: 101;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
        }
        
        .menu-line {
            width: 20px;
            height: 1px;
            background: #666;
            transition: all 0.3s ease;
        }
        
        @media (max-width: 640px) {
            .mobile-menu-toggle {
                display: flex;
            }
            
            .tg-buttons {
                display: none;
                position: fixed;
                top: 70px;
                right: 20px;
                left: 20px;
                background: rgba(20, 20, 20, 0.95);
                border: 1px solid #333;
                padding: 15px;
                justify-content: center;
            }
            
            .tg-buttons.mobile-open {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div class="texture-overlay"></div>
    <div class="glitch"></div>
    
    <!-- Telegram кнопки в правом верхнем углу -->
    <div class="tg-buttons">
        <a href="https://t.me/+wRSRv9SRegs2NWJi" target="_blank" class="tg-button">
            <!-- Вставьте свою иконку в src -->
            <img src="img/tg_anorlondo.jpg" alt="anorlondo">
            <span class="tooltip">anorlondo</span>
        </a>
        <a href="https://t.me/+soq0CY-FBFxkNzBi" target="_blank" class="tg-button">
            <img src="img/tg_capital.jpg" alt="capital">
            <span class="tooltip">capital</span>
        </a>
        <a href="https://t.me/+k52fhZ4pZfJjMjUy" target="_blank" class="tg-button">
            <img src="img/tg_antegria.jpg" alt="antegria">
            <span class="tooltip">antegria</span>
        </a>
    </div>
    
    <!-- Мобильное меню -->
    <div class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        <div class="menu-line"></div>
        <div class="menu-line"></div>
        <div class="menu-line"></div>
    </div>
    
    <div class="container">
        <header>
            <h1 class="site-title fade-in">anorlodno</h1>
            <div class="site-subtitle fade-in delay-1">.- -. --- .-. .-.. --- -. -.. ---</div>
        </header>
        
        <div class="grunge-line fade-in delay-1"></div>
        
        <section class="section fade-in delay-2">
            <h2 class="section-title">Файлы</h2>
            <div class="files-grid">
                <div class="file-item">
                    <span class="file-name">cosmicpack.zip</span>
                    <div class="file-description">Ресурспак сервера</div>
                    <span class="file-size">140 KB</span>
                    <a href="cosmicpack.zip" class="download-link" download onclick="showNotification('Начинается загрузка cosmicpack.zip')">скачать</a>
                </div>
                
                <div class="file-item">
                    <span class="file-name">map.zip</span>
                    <div class="file-description">карта со всеми предметами</div>
                    <span class="file-size">3.3 MB</span>
                    <a href="map.zip" class="download-link" download onclick="showNotification('Начинается загрузка map.zip')">скачать</a>
                </div>
            </div>
        </section>
        
        <div class="grunge-line"></div>
        
        <footer class="fade-in delay-4">
            <div class="footer-text">timofeyporno © 2025</div>
            <div class="footer-text" style="margin-top: 8px; color: #444;">все материалы для коммерческого использования</div>
        </footer>
    </div>
    
    <div class="notification" id="notification"></div>

    <script>
        // Уведомления
        const notification = document.getElementById('notification');
        
        function showNotification(text) {
            notification.textContent = text;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // Скачивание файлов (резервная функция)
        function downloadFile(fileId) {
            event.preventDefault();
            
            let fileName = '';
            
            if (fileId === 'file1') {
                fileName = 'cosmicpack.zip';
            } else {
                fileName = 'map.zip';
            }
            
            showNotification(`начата загрузка: ${fileName}`);
        }
        
        // Мобильное меню
        function toggleMobileMenu() {
            const tgButtons = document.querySelector('.tg-buttons');
            tgButtons.classList.toggle('mobile-open');
        }
        
        // Случайные эффекты глюков
        function createGlitchEffect() {
            const glitch = document.querySelector('.glitch');
            const glitchTypes = [
                'linear-gradient(45deg, transparent 50%, rgba(255,0,0,0.1) 50%)',
                'linear-gradient(-45deg, transparent 50%, rgba(0,255,0,0.1) 50%)',
                'linear-gradient(90deg, transparent 50%, rgba(0,0,255,0.1) 50%)'
            ];
            
            setInterval(() => {
                if (Math.random() > 0.7) {
                    glitch.style.background = glitchTypes[Math.floor(Math.random() * glitchTypes.length)];
                }
            }, 100);
        }
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            createGlitchEffect();
            
            // Постепенное появление элементов
            const fadeElements = document.querySelectorAll('.fade-in');
            fadeElements.forEach(el => {
                el.style.animationPlayState = 'running';
            });
            
            // Эффект мигания курсора в заголовке
            const title = document.querySelector('.site-title');
            let cursorVisible = true;
            
            setInterval(() => {
                if (cursorVisible) {
                    title.style.borderRight = '1px solid #444';
                } else {
                    title.style.borderRight = 'none';
                }
                cursorVisible = !cursorVisible;
            }, 530);
            
            // Закрытие меню при клике вне его
            document.addEventListener('click', function(event) {
                const tgButtons = document.querySelector('.tg-buttons');
                const menuToggle = document.querySelector('.mobile-menu-toggle');
                
                if (!tgButtons.contains(event.target) && !menuToggle.contains(event.target)) {
                    tgButtons.classList.remove('mobile-open');
                }
            });
            
            // Проверка ссылок на файлы (для отладки)
            const fileLinks = document.querySelectorAll('.download-link[href]');
            fileLinks.forEach(link => {
                const fileName = link.getAttribute('href');
                console.log(`Проверка файла: ${fileName}`);
            });
        });
        
        // Инструкция
        console.log('Сайт настроен для работы с реальными ссылками:');
        console.log('1. Telegram кнопки ведут на каналы:');
        console.log('   - https://t.me/anorlondo');
        console.log('   - https://t.me/capital');
        console.log('   - https://t.me/antegria');
        console.log('2. Файлы для скачивания:');
        console.log('   - cosmicpack.zip');
        console.log('   - map.zip');
        console.log('3. Положите файлы в ту же папку, что и HTML файл');
    </script>
</body>
</html>
