<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дневник охотников SVT — Тимофей и Иван Винс</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Kalam:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #e8dab3;
    --paper-2: #ddc793;
    --paper-shadow: #b9a066;
    --ink: #2a1c10;
    --ink-soft: #4a3a24;
    --blood: #6e1616;
    --blood-2: #8f2020;
    --leather: #38220f;
    --leather-dark: #1c1108;
    --brass: #b7893f;
    --brass-light: #d9b06a;
    --glow: rgba(255, 178, 96, 0.18);
  }

  *{ box-sizing: border-box; }

  html,body{
    height:100%;
    margin:0;
    background:
      radial-gradient(ellipse at 50% 0%, #3a2a1a 0%, #140d07 70%),
      linear-gradient(180deg,#241609,#0e0904);
    font-family:'EB Garamond', serif;
    color:var(--ink);
    overflow:hidden;
  }

  /* ---------- Ambient wood-desk stage ---------- */
  .stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:2400px;
  }

  .stage::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.15) 0 2px, transparent 2px 140px);
    opacity:.35;
    pointer-events:none;
  }

  .candle-glow{
    position:absolute;
    top:-10%;
    left:50%;
    transform:translateX(-50%);
    width:1200px;
    height:900px;
    background:radial-gradient(circle, var(--glow) 0%, transparent 60%);
    animation:flicker 6s infinite ease-in-out;
    pointer-events:none;
  }
  @keyframes flicker{
    0%,100%{ opacity:.9; }
    45%{ opacity:.6; }
    50%{ opacity:1; }
    72%{ opacity:.7; }
  }

  .title-plate{
    position:absolute;
    top:22px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:5;
    pointer-events:none;
  }
  .title-plate .eyebrow{
    font-family:'Special Elite', monospace;
    letter-spacing:.35em;
    font-size:11px;
    color:var(--brass-light);
    opacity:.75;
    text-transform:uppercase;
  }
  .title-plate h1{
    font-family:'Kalam', cursive;
    font-size:22px;
    color:#e9d6ab;
    margin:2px 0 0;
    text-shadow:0 0 12px rgba(0,0,0,.6);
  }

  /* ---------- The book ---------- */
  .book-wrap{
    position:relative;
    width:min(920px, 92vw);
    height:min(620px, 78vh);
  }

  .spine{
    position:absolute;
    left:-14px;
    top:-16px;
    bottom:-16px;
    width:34px;
    background:
      linear-gradient(90deg, var(--leather-dark), var(--leather) 40%, #2b1a0c 100%);
    border-radius:6px 0 0 6px;
    box-shadow: inset -4px 0 10px rgba(0,0,0,.6), 0 10px 30px rgba(0,0,0,.7);
    z-index:1;
  }
  .spine::before{
    content:"";
    position:absolute; inset:8px 4px;
    background-image: repeating-linear-gradient(180deg, transparent 0 22px, rgba(183,137,63,.35) 22px 24px);
  }

  .cover-frame{
    position:absolute;
    inset:0;
    background:
      radial-gradient(ellipse at 30% 20%, #4a2f18, #241408 75%);
    border-radius: 4px 10px 10px 4px;
    box-shadow:
      0 25px 60px rgba(0,0,0,.75),
      inset 0 0 0 2px rgba(183,137,63,.25),
      inset 0 0 40px rgba(0,0,0,.6);
    padding: 14px 14px 14px 26px;
    z-index:0;
  }

  .book{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
  }

  .page{
    position:absolute;
    inset:0;
    transform-origin:left center;
    transform-style:preserve-3d;
    transition: transform 0.9s cubic-bezier(.6,.05,.28,1);
  }
  .page.flipped{ transform:rotateY(-179.5deg); }

  .face{
    position:absolute; inset:0;
    background: var(--paper);
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
    border-radius: 2px 8px 8px 2px;
    box-shadow: inset 0 0 60px rgba(120,90,40,.25), 2px 0 10px rgba(0,0,0,.25);
    overflow:hidden;
  }
  .face.back{ transform: rotateY(180deg); }

  .page .face.front{ opacity:1; visibility:visible; }
  .page .face.back{ opacity:0; visibility:hidden; }
  .page.show-back .face.front{ opacity:0; visibility:hidden; }
  .page.show-back .face.back{ opacity:1; visibility:visible; }

  .paper-texture{
    position:absolute; inset:0;
    background-image:
      radial-gradient(ellipse at 85% 8%, rgba(150,110,50,.35), transparent 40%),
      radial-gradient(ellipse at 10% 92%, rgba(120,90,40,.3), transparent 45%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
    pointer-events:none;
  }
  .burnt-edge{
    position:absolute; inset:0;
    pointer-events:none;
    box-shadow: inset 0 0 40px 6px rgba(60,30,10,.35);
  }

  .content{
    position:relative;
    height:100%;
    padding: 34px 40px 46px;
    overflow-y:auto;
    z-index:2;
  }
  .content::-webkit-scrollbar{ width:6px; }
  .content::-webkit-scrollbar-thumb{ background:var(--paper-shadow); border-radius:4px; }

  .stamp{
    font-family:'Special Elite', monospace;
    font-size:10px;
    letter-spacing:.2em;
    color:var(--blood);
    text-transform:uppercase;
    opacity:.75;
    border:1px solid var(--blood);
    display:inline-block;
    padding:3px 8px;
    transform:rotate(-3deg);
    margin-bottom:10px;
  }

  h2.page-title{
    font-family:'Special Elite', monospace;
    font-size: 22px;
    color:var(--ink);
    letter-spacing:.03em;
    margin: 0 0 4px;
    border-bottom:2px solid var(--ink-soft);
    padding-bottom:8px;
    display:inline-block;
  }
  .subhead{
    font-family:'Kalam', cursive;
    color:var(--blood);
    font-size:16px;
    margin:18px 0 6px;
  }
  p, li{
    font-size:16px;
    line-height:1.55;
    color:var(--ink-soft);
  }
  ul{ margin:6px 0 14px 18px; padding:0; }
  li{ margin-bottom:6px; }
  strong{ color:var(--ink); }

  .note{
    font-family:'Kalam', cursive;
    font-size:15px;
    color:var(--blood-2);
    background: rgba(110,22,22,.06);
    border-left:3px solid var(--blood);
    padding:8px 12px;
    margin:12px 0;
    transform:rotate(-0.4deg);
  }
  .note strong{ font-weight:700; color:var(--blood); }

  .content a{
    color: var(--blood);
    font-weight:700;
    text-decoration: underline dashed;
    text-underline-offset:3px;
    cursor:pointer;
    transition: color .2s ease;
  }
  .content a:hover{ color: var(--blood-2); }

  .taped-photo{
    position:relative;
    width:200px;
    margin:38px auto 10px;
    background:#efe6d2;
    padding:10px 10px 34px;
    box-shadow: 0 10px 22px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.4) inset;
    transform: rotate(-3.5deg);
  }
  .photo-placeholder{
    width:100%;
    height:150px;
    background:
      radial-gradient(ellipse at 30% 20%, #4a3a26, transparent 60%),
      linear-gradient(135deg,#5b4a34,#231a10);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    filter:sepia(.2);
  }
  .photo-placeholder span{
    font-family:'Kalam', cursive;
    font-size:12px;
    color:#cbb583;
    opacity:.8;
  }
  .photo-caption{
    position:absolute;
    bottom:8px; left:0; right:0;
    text-align:center;
    font-family:'Kalam', cursive;
    font-size:12px;
    color:var(--ink-soft);
  }
  .tape{
    position:absolute;
    width:64px; height:24px;
    background: linear-gradient(180deg, rgba(232,220,180,.75), rgba(210,196,150,.6));
    box-shadow:0 1px 3px rgba(0,0,0,.35);
    opacity:.85;
  }
  .tape::after{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(115deg, transparent 0 3px, rgba(255,255,255,.25) 3px 4px);
  }
  .tape-left{ top:-12px; left:-10px; transform: rotate(-38deg); }
  .tape-right{ top:-12px; right:-10px; transform: rotate(38deg); }

  .divider{
    width:60px; height:2px; background:var(--ink-soft); opacity:.4;
    margin:14px 0;
  }

  /* watermark sigil */
  .sigil{
    position:absolute;
    width:230px; height:230px;
    right:-30px; bottom:-30px;
    opacity:.06;
    pointer-events:none;
  }

  /* ---------- Cover page ---------- */
  .cover-face{
    background:
      radial-gradient(ellipse at 50% 30%, #4b3018, #201105 80%);
  }
  .cover-inner{
    height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#e4cd9a;
    position:relative;
  }
  .emblem{ width:150px; height:150px; opacity:.9; filter:drop-shadow(0 0 10px rgba(217,176,106,.4)); }
  .cover-inner h1{
    font-family:'Kalam', cursive;
    font-size:34px;
    margin:18px 0 2px;
    color:#f1dfae;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .cover-inner .sub{
    font-family:'Special Elite', monospace;
    letter-spacing:.25em;
    font-size:12px;
    color:var(--brass-light);
    text-transform:uppercase;
    opacity:.85;
  }
  .cover-inner .hint{
    margin-top:26px;
    font-family:'EB Garamond', serif;
    font-style:italic;
    font-size:14px;
    color:#c9b184;
    opacity:.8;
  }

  /* ---------- last page ---------- */
  .end-face .cover-inner h1{ font-size:26px; }

  /* ---------- Controls ---------- */
  .nav-btn{
    position:absolute;
    top:50%; transform:translateY(-50%);
    width:46px; height:46px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass) 60%, #6b4a1f 100%);
    box-shadow:0 4px 12px rgba(0,0,0,.6), inset 0 0 4px rgba(255,255,255,.4);
    border:none;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:20;
    transition: transform .15s ease, filter .15s ease;
  }
  .nav-btn:hover{ filter:brightness(1.15); transform:translateY(-50%) scale(1.06); }
  .nav-btn:active{ transform:translateY(-50%) scale(.94); }
  .nav-btn.prev{ left:-58px; }
  .nav-btn.next{ right:-58px; }
  .nav-btn svg{ width:18px; height:18px; fill:#241408; }
  .nav-btn:disabled{ opacity:.25; cursor:default; }
  .nav-btn:disabled:hover{ filter:none; transform:translateY(-50%); }

  .page-counter{
    position:absolute;
    bottom:-38px;
    left:50%; transform:translateX(-50%);
    font-family:'Special Elite', monospace;
    font-size:12px;
    letter-spacing:.15em;
    color:#c9ad78;
    z-index:10;
  }

  .toc{
    position:absolute;
    top:-40px;
    left:50%; transform:translateX(-50%);
    display:flex;
    gap:6px;
    z-index:10;
  }
  .toc span{
    width:7px; height:7px; border-radius:50%;
    background:rgba(201,173,120,.3);
    display:inline-block;
    transition:background .3s;
  }
  .toc span.active{ background: var(--brass-light); box-shadow:0 0 6px var(--brass-light); }

  @media (max-width:720px){
    .nav-btn.prev{ left:6px; }
    .nav-btn.next{ right:6px; }
    .nav-btn{ width:38px; height:38px; }
    .content{ padding:26px 20px 36px; }
    h2.page-title{ font-size:18px; }
    p, li{ font-size:14.5px; }
    .book-wrap{ width:94vw; height:80vh; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="candle-glow"></div>
  <div class="title-plate">
    <div class="eyebrow">Личное имущество · не подлежит разглашению</div>
    <h1>Дневник охотников SVT</h1>
  </div>

  <div class="book-wrap">
    <div class="toc" id="toc"></div>
    <div class="spine"></div>
    <div class="cover-frame">
      <div class="book" id="book"></div>
    </div>
    <button class="nav-btn prev" id="prevBtn" aria-label="Предыдущая страница">
      <svg viewBox="0 0 24 24"><path d="M15 4l-8 8 8 8 1.4-1.4L9.8 12l6.6-6.6z"/></svg>
    </button>
    <button class="nav-btn next" id="nextBtn" aria-label="Следующая страница">
      <svg viewBox="0 0 24 24"><path d="M9 4l8 8-8 8-1.4-1.4L14.2 12 7.6 5.4z"/></svg>
    </button>
    <div class="page-counter" id="pageCounter">1 / 11</div>
  </div>
</div>

<script>
const sigilSVG = `<svg class="sigil" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="90" fill="none" stroke="#2a1c10" stroke-width="2"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="#2a1c10" stroke-width="1"/>
  <polygon points="100,20 137,155 15,72 185,72 63,155" fill="none" stroke="#2a1c10" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="#2a1c10"/>
</svg>`;

const emblemSVG = `<svg class="emblem" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="92" fill="none" stroke="#d9b06a" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="#d9b06a" stroke-width="1.5"/>
  <g stroke="#d9b06a" stroke-width="2">
    <line x1="100" y1="8" x2="100" y2="40"/>
    <line x1="100" y1="160" x2="100" y2="192"/>
    <line x1="8" y1="100" x2="40" y2="100"/>
    <line x1="160" y1="100" x2="192" y2="100"/>
    <line x1="34" y1="34" x2="58" y2="58"/>
    <line x1="142" y1="142" x2="166" y2="166"/>
    <line x1="166" y1="34" x2="142" y2="58"/>
    <line x1="58" y1="142" x2="34" y2="166"/>
  </g>
  <polygon points="100,44 128,152 26,80 174,80 72,152" fill="none" stroke="#d9b06a" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="10" fill="#d9b06a"/>
</svg>`;

const pages = [
  // 0 — cover
  {
    cls: 'cover-face',
    front: `
      <div class="cover-inner">
        ${emblemSVG}
        <h1>Дневник охотников SVT</h1>
        <div class="sub">Тимофей и Иван Винс</div>
        <div class="hint">— открой, если готов узнать правду —</div>
      </div>`,
    back: `<div class="content"><div class="paper-texture"></div>${sigilSVG}
      <span class="stamp">Хранить у сердца</span>
      <p style="margin-top:40px;">Эта тетрадь передавалась из рук в руки каждому, кто решил, что нечисть не пройдёт мимо него незамеченной. Соль на подоконниках, клинок под подушкой, огниво в кармане — стандартный набор ночи.</p>
      <p>Дальше — всё, что мы знаем. Читай внимательно. Второго шанса нечисть не даёт.</p>
    </div>`
  },
  // 1 — intro
  {
    front: `<div class="content"><div class="paper-texture"></div>${sigilSVG}
      <span class="stamp">Запись первая</span>
      <h2 class="page-title">Если ты это читаешь...</h2>
      <p>...значит, что-то уже скребётся за дверью, а ты не знаешь, солью его встречать или свинцом.</p>
      <div class="note"><strong>Тим:</strong> Слушай сюда и не геройствуй. Правила писаны кровью — в основном моей.</div>
      <div class="note"><strong>Иван:</strong> Каждое существо здесь убито хоть раз. Метод — не теория, а протокол выживания.</div>
      <p>Дальше — оружие, которое должно быть под рукой всегда, и порядок действий для каждой твари, которую можно встретить на этой земле. Ошибиться с методом — значит не встретить рассвет.</p>
      <div class="note"><strong>Важно:</strong> вступая в Штат Орегон, ты обязуешься всё время следовать этим РП-правилам без исключений.</div>
    </div>`,
    back: `<div class="content"><div class="paper-texture"></div>
      <span class="stamp">На полях</span>
      <p style="margin-top:60px; font-family:'Kalam',cursive; font-size:18px; color:var(--blood-2); text-align:center;">
        «Не всё, что улыбается тебе в темноте — друг.»
      </p>
    </div>`
  },
  // 2 — дневник продолжается
  {
    front: `<div class="content"><div class="paper-texture"></div>${sigilSVG}
      <span class="stamp">Важная запись</span>
      <h2 class="page-title">Дневник продолжается</h2>
      <p>Эта тетрадь не закончена — она будет дописываться на протяжении всего сезона. Новые твари, новые методы, фотографии с охоты и находки — всё будет добавляться сюда по ходу событий.</p>
      <div class="note"><strong>Тим:</strong> Нашёл что-то полезное или заснял след — не держи при себе. Присылай, пусть остальные тоже знают.</div>
      <div class="divider"></div>
      <p>Присылай находки, фото и записи в предложку <a href="https://t.me/+fYMGlp6vCx9kOGQy" target="_blank" rel="noopener">КБ</a>.</p>
      <p>Следи за новыми записями и обновлениями в канале <a href="https://t.me/+_TJR1SZW6phjNDFi" target="_blank" rel="noopener">SVT</a>.</p>
      <div class="note"><strong>Иван:</strong> Дневник живой, пока его пишут. Не молчи о том, что видел.</div>
    </div>`,
    back: `<div class="content"><div class="paper-texture"></div>
      <span class="stamp">Вложение №1</span>
      <div class="taped-photo">
        <div class="tape tape-left"></div>
        <div class="tape tape-right"></div>
        <div class="photo-placeholder">
          <svg viewBox="0 0 64 64" width="34" height="34"><path fill="#cbb583" d="M8 20h10l4-6h20l4 6h10a2 2 0 0 1 2 2v28a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V22a2 2 0 0 1 2-2z" fill-opacity=".25" stroke="#cbb583" stroke-width="2" fill="none"/><circle cx="32" cy="36" r="10" fill="none" stroke="#cbb583" stroke-width="2"/></svg>
          <span>фото появится здесь</span>
        </div>
        <div class="photo-caption">— из следующей охоты —</div>
      </div>
      <p style="margin-top:14px; font-family:'Kalam',cursive; font-size:15px; color:var(--ink-soft); text-align:center;">Место для будущих фотографий и вырезок.</p>
    </div>`
  },
  // 3 — оружие
  {
    front: `<div class="content"><div class="paper-texture"></div>${sigilSVG}
      <span class="stamp">Снаряжение</span>
      <h2 class="page-title">Оружие и экипировка охотника</h2>
      <p>В инвентаре всегда должен быть правильный арсенал — без него в ночную смену лучше не выходить.</p>
      <ul>
        <li><strong>Святая вода</strong> — исцеляющие взрывные колбы. Держи под рукой, льётся туда, где не должна оставаться нечисть.</li>
        <li><strong>Соль</strong> — сахар или перекрашенный в белый сахар. Простая вещь, а держит границу лучше стальной двери.</li>
        <li><strong>Серебряные клинки</strong> — железные мечи. Металл, который твари уважают.</li>
        <li><strong>Дробовик с солью</strong> — арбалет. Первый выстрел почти всегда решающий.</li>
        <li><strong>Кольт</strong> — лук. Легенда о нём больше, чем сам ствол, но бьёт метко.</li>
        <li><strong>Огниво</strong> — последняя точка почти в каждой охоте. Огонь не оставляет второго шанса.</li>
      </ul>
      <div class="note"><strong>Тимофей:</strong> Проверяй сумку перед выездом. Дважды. Потом ещё раз.</div>
      <div class="note"><strong>Запрет:</strong> элитры на территории охоты под запретом. Небо — не место для того, кто должен чуять землю под ногами.</div>
    </div>`,
    back: `<div class="content"><div class="paper-texture"></div>
      <p style="margin-top:40px;">Пустой лист. Дописать снаряжение по мере находок.</p>
    </div>`
  },
  // 3 — зомби/скелеты
  {
    front: `<div class="content"><div class="paper-texture"></div>${sigilSVG}

const bookEl = document.getElementById('book');
const tocEl = document.getElementById('toc');
const total = pages.length;
let current = 0;

pages.forEach((p, i) => {
  const pageDiv = document.createElement('div');
  pageDiv.className = 'page';
  pageDiv.style.zIndex = total - i;
  pageDiv.innerHTML = `
    <div class="face front ${p.cls || ''}">${p.front}<div class="burnt-edge"></div></div>
    <div class="face back ${i===total-1 ? p.cls||'' : ''}">${p.back}<div class="burnt-edge"></div></div>
  `;
  bookEl.appendChild(pageDiv);

  const dot = document.createElement('span');
  tocEl.appendChild(dot);
});

const pageEls = Array.from(bookEl.children);
const dotEls = Array.from(tocEl.children);
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const counter = document.getElementById('pageCounter');

function render(animating=false){
  pageEls.forEach((el, i) => {
    if(!animating){
      el.style.zIndex = i < current ? i : (total - i);
      el.classList.toggle('show-back', i < current);
    }
    el.classList.toggle('flipped', i < current);
  });
  dotEls.forEach((d, i) => d.classList.toggle('active', i === Math.min(current, total-1)));
  const shown = Math.min(current+1, total);
  counter.textContent = shown + ' / ' + total;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current >= total;
}

function next(){
  if(current >= total) return;
  const el = pageEls[current];
  el.style.zIndex = 500;
  el.classList.add('flipped');
  setTimeout(() => el.classList.add('show-back'), 450);
  current++;
  setTimeout(() => render(), 900);
  render(true);
}

function prev(){
  if(current === 0) return;
  current--;
  const el = pageEls[current];
  el.style.zIndex = 500;
  el.classList.remove('flipped');
  setTimeout(() => el.classList.remove('show-back'), 450);
  setTimeout(() => render(), 900);
  render(true);
}

nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight') next();
  if(e.key === 'ArrowLeft') prev();
});

render();
</script>
